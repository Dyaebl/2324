<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Important Question</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
  }

  .card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    position: relative;
    z-index: 10;
    width: 400px;
    height: 300px;
  }

  h1 {
    margin-bottom: 30px;
  }

  button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    position: absolute;
  }

  #yesBtn {
    background: #ff99ff;
    color: white;
    left: 30%;
    top: 60%;
    transform: translate(-50%, -50%) scale(1);
  }

  #noBtn {
    background: #ccc;
    left: 70%;
    top: 60%;
    transform: translate(-50%, -50%);
    transition: left 0.2s ease, top 0.2s ease;
  }

  .hidden {
    display: none;
  }

  .result {
    font-size: 28px;
    color: white;
    text-align: center;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <h1>Will you be my girlfriend? ❤️</h1>
  <button id="yesBtn" onclick="sayYes()">Yes 😈</button>
  <button id="noBtn">No 😇</button>
</div>

<div class="result hidden" id="result">
  🎉 I knew you would pick Yes 😈 🎉
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
let scale = 1;

// Move No button and grow Yes button
document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();
  const dx = e.clientX - (rect.left + rect.width/2);
  const dy = e.clientY - (rect.top + rect.height/2);
  const distance = Math.sqrt(dx*dx + dy*dy);

  if (distance < 120) {
    // Clamp inside viewport
    const maxX = window.innerWidth - noBtn.offsetWidth/2;
    const maxY = window.innerHeight - noBtn.offsetHeight/2;
    const minX = noBtn.offsetWidth/2;
    const minY = noBtn.offsetHeight/2;

    const newX = Math.random() * (maxX - minX) + minX;
    const newY = Math.random() * (maxY - minY) + minY;

    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";

    // Grow Yes button while keeping shape
    scale += 0.1;
    yesBtn.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }
});

function sayYes() {
  document.getElementById("card").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  launchConfetti();
}

// Simple Confetti
function launchConfetti() {
  for (let i = 0; i < 100; i++) {
    const confetti = document.createElement("div");
    confetti.style.position = "fixed";
    confetti.style.width = "10px";
    confetti.style.height = "10px";
    confetti.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
    confetti.style.left = Math.random() * window.innerWidth + "px";
    confetti.style.top = "-10px";
    confetti.style.opacity = 0.7;
    document.body.appendChild(confetti);

    const fall = Math.random() * 3 + 2;
    confetti.animate([{ transform: "translateY(0px)" }, { transform: `translateY(${window.innerHeight}px)` }], {
      duration: fall * 1000,
      easing: "linear"
    });
    setTimeout(() => confetti.remove(), 4000);
  }
}

// Memes
const memeImages = [
  "https://media.discordapp.net/attachments/1420717886904991789/1486667268099281017/image.png",
  "https://media.discordapp.net/attachments/1420717886904991789/1486669969835032666/i-love-you.png"
];
const memes = [];

function createMeme() {
  const img = document.createElement("img");
  img.src = memeImages[Math.floor(Math.random() * memeImages.length)];
  img.style.position = "fixed";
  img.style.width = "100px";
  img.style.height = "100px";
  img.style.pointerEvents = "none";
  img.style.zIndex = "0";
  img.style.willChange = "transform";

  // Random position inside viewport
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);
  img.style.transform = `translate(${x}px, ${y}px)`;
  document.body.appendChild(img);

  return {
    el: img,
    x, y,
    dx: (Math.random() - 0.5) * 6,
    dy: (Math.random() - 0.5) * 6,
    rotation: Math.random() * 360,
    spin: (Math.random() - 0.5) * 2
  };
}

// create memes
for (let i = 0; i < 8; i++) {
  memes.push(createMeme());
}

// Animate memes inside screen
function animateMemes() {
  memes.forEach(m => {
    m.x += m.dx;
    m.y += m.dy;
    m.rotation += m.spin * 0.5;

    // Bounce inside screen
    if (m.x <= 0 || m.x >= window.innerWidth - m.el.offsetWidth) {
      m.dx *= -1;
      m.x = Math.max(0, Math.min(m.x, window.innerWidth - m.el.offsetWidth));
    }
    if (m.y <= 0 || m.y >= window.innerHeight - m.el.offsetHeight) {
      m.dy *= -1;
      m.y = Math.max(0, Math.min(m.y, window.innerHeight - m.el.offsetHeight));
    }

    m.el.style.transform = `translate(${m.x}px, ${m.y}px) rotate(${m.rotation}deg)`;
  });

  requestAnimationFrame(animateMemes);
}

animateMemes();
</script>

</body>
</html>
