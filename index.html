<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Important Question</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
  }

  .card {
    position: fixed;          
    top: 50%;                 
    left: 50%;
    width: 600px
    transform: translate(-50%, -50%); 
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
    width: 400px;
    height: 300px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

  h1 { margin-bottom: 30px; }

  button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
  }

  #yesBtn {
    background: #ff99ff;
    color: white;
    position: relative;
    transform: translateX(-100px);
  }

  #noBtn {
    position: fixed; 
    left: 55%;
    top: 52%;
    transform: translate(-50%, -50%);
    background: #ccc;
    border-radius: 10px;
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    z-index: 20;
    transition: left 0.2s ease, top 0.2s ease;
  }

  .hidden { display: none; }

  .result {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px;
  color: white;
  text-align: center;
  z-index: 15;
}
  
</style>
</head>
<body>

<div class="card" id="card">
  <h1>Will you be my girlfriend? ❤️</h1>
  <button id="yesBtn" onclick="sayYes()">Yes 😈</button>
</div>

<button id="noBtn">No 😇</button>
<div class="result hidden" id="result">🎉 I knew you would pick Yes 😈 🎉</div>

<script>
const card = document.getElementById("card");
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
let scale = 1;

// No button movement
document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();
  const dx = e.clientX - (rect.left + rect.width/2);
  const dy = e.clientY - (rect.top + rect.height/2);
  const distance = Math.sqrt(dx*dx + dy*dy);

  if (distance < 120) {
    const maxX = window.innerWidth - noBtn.offsetWidth / 2;
    const maxY = window.innerHeight - noBtn.offsetHeight / 2;
    const minX = noBtn.offsetWidth / 2;
    const minY = noBtn.offsetHeight / 2;

    const newX = Math.random() * (maxX - minX) + minX;
    const newY = Math.random() * (maxY - minY) + minY;

    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";

    // Grow YES button safely
    scale += 0.1;
    yesBtn.style.transform = `scale(${scale})`;
  }
});

// Original memes
const memeImages = [
  "https://cdn.discordapp.com/attachments/1420717886904991789/1486667268099281017/image.png?ex=69c65649&is=69c504c9&hm=24bc090f9cb76d0d0baec64d485c3f1e8fda85fbef13f344efcdc36b958c44ef&",
  "https://media.discordapp.net/attachments/1420717886904991789/1486669969835032666/i-love-you.png?ex=69c658cd&is=69c5074d&hm=dbebb6f2e5d4974665dda9fb9feb9263569abf519743e830243fafb27b7b8d2b&=&format=webp&quality=lossless"
];

// Replacement memes after Yes
const newMemeImages = [
  "https://media.discordapp.net/attachments/1420717886904991789/1486707078201344010/cat-evil-laugh.png?ex=69c67b5d&is=69c529dd&hm=360c676410bc6ce5d58d33bf1840fac7d0f28830ce25c9e0923a46eee7ef84c1&=&format=webp&quality=lossless"
];

let elements = [];

// Create a moving meme element
function createMeme(imageArray) {
  const img = document.createElement("img");
  img.src = imageArray[Math.floor(Math.random() * imageArray.length)];
  img.style.position = "fixed";
  img.style.top = "0";
  img.style.left = "0";
  img.style.width = "150px";
  img.style.height = "150px";
  img.style.pointerEvents = "none";
  img.style.zIndex = "0";
  img.style.willChange = "transform";

  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);
  img.style.transform = `translate(${x}px, ${y}px)`;
  document.body.appendChild(img);

  elements.push({
    el: img,
    x, y,
    dx: (Math.random() - 0.5) * 6,
    dy: (Math.random() - 0.5) * 6,
    rotation: Math.random() * 360,
    spin: (Math.random() - 0.5) * 2
  });
}

// Initialize original memes
for (let i = 0; i < 8; i++) createMeme(memeImages);

// Animate bouncing elements
function animateElements() {
  elements.forEach(m => {
    m.x += m.dx;
    m.y += m.dy;
    m.rotation += m.spin * 0.5;

    if (m.x <= 0 || m.x >= window.innerWidth - m.el.offsetWidth) m.dx *= -1;
    if (m.y <= 0 || m.y >= window.innerHeight - m.el.offsetHeight) m.dy *= -1;

    m.x = Math.max(0, Math.min(m.x, window.innerWidth - m.el.offsetWidth));
    m.y = Math.max(0, Math.min(m.y, window.innerHeight - m.el.offsetHeight));

    m.el.style.transform = `translate(${m.x}px, ${m.y}px) rotate(${m.rotation}deg)`;
  });
  requestAnimationFrame(animateElements);
}
animateElements();

// On Yes click: replace memes with new memes + confetti
function sayYes() {
  card.classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  elements.forEach(m => {
    m.el.src = newMemeImages[Math.floor(Math.random() * newMemeImages.length)];
    m.el.style.zIndex = "100"; // bring to front
  });

  // Confetti
  for (let i = 0; i < 100; i++) {
    const confetti = document.createElement("div");
    confetti.style.position = "fixed";
    confetti.style.width = "10px";
    confetti.style.height = "10px";
    confetti.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
    confetti.style.left = Math.random() * window.innerWidth + "px";
    confetti.style.top = "-10px";
    confetti.style.opacity = 0.7;
    document.body.appendChild(confetti);

    const fall = Math.random() * 3 + 2;
    confetti.animate([{ transform: "translateY(0px)" }, { transform: `translateY(${window.innerHeight}px)` }], {
      duration: fall * 1000,
      easing: "linear"
    });
    setTimeout(() => confetti.remove(), 4000);
  }
}
</script>
</body>
</html>
